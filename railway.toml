[build]
# Use the Dockerfile at the repo root, not Nixpacks.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Watch the entire repo — monorepo changes to packages/core or packages/server
# affect the apps/web build. Without this, Railway only watches the service's
# root directory and misses Dockerfile/lockfile changes.
watchPatterns = ["**"]

[deploy]
# Healthcheck temporarily disabled to debug container startup.
# Re-enable after first successful deploy:
#   healthcheckPath = "/api/health"
#   healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
